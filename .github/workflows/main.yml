name: EAS Update

on:
  push:
    branches:
      - main

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - run: npm install

      - run: npm install -g eas-cli

      - run: eas update --branch preview --message "Auto OTA Update"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
